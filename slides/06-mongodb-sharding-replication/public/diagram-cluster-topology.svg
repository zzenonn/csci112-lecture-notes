<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 330" width="560" height="330">
  <defs>
    <marker id="ta" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L0,8 L8,4 z" fill="#64748b"/>
    </marker>
    <marker id="tad" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L0,8 L8,4 z" fill="#94a3b8"/>
    </marker>
  </defs>

  <!-- Users icon -->
  <circle cx="52" cy="110" r="16" fill="#94a3b8"/>
  <rect x="28" y="126" width="48" height="26" rx="12" fill="#94a3b8"/>
  <circle cx="36" cy="118" r="11" fill="#cbd5e1"/>
  <rect x="20" y="130" width="34" height="20" rx="8" fill="#cbd5e1"/>
  <circle cx="68" cy="118" r="11" fill="#cbd5e1"/>
  <rect x="54" y="130" width="34" height="20" rx="8" fill="#cbd5e1"/>
  <text x="52" y="162" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#475569">Clients</text>

  <!-- Arrow: clients <-> mongos -->
  <line x1="88" y1="124" x2="156" y2="124" stroke="#64748b" stroke-width="1.8" marker-end="url(#ta)"/>
  <line x1="156" y1="134" x2="88" y2="134" stroke="#64748b" stroke-width="1.8" marker-end="url(#ta)"/>

  <!-- Mongos box -->
  <rect x="158" y="96" width="90" height="62" rx="6" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <rect x="174" y="104" width="58" height="30" rx="3" fill="#16a34a"/>
  <text x="203" y="124" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="700" fill="white">mongos</text>
  <text x="203" y="148" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#166534">(router)</text>

  <!-- Dashed arrows: mongos <-> Config Server -->
  <line x1="248" y1="106" x2="336" y2="62" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#tad)"/>
  <line x1="336" y1="72" x2="248" y2="116" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#tad)"/>

  <!-- Config Server box — taller to avoid overlap -->
  <rect x="336" y="20" width="196" height="80" rx="6" fill="#f5f3ff" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="434" y="40" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="700" fill="#4c1d95">Config Server</text>
  <!-- Two cylinders with more vertical space -->
  <ellipse cx="390" cy="74" rx="22" ry="7" fill="#a78bfa"/>
  <rect x="368" y="56" width="44" height="24" fill="#c4b5fd"/>
  <ellipse cx="390" cy="56" rx="22" ry="7" fill="#a78bfa"/>
  <ellipse cx="458" cy="74" rx="22" ry="7" fill="#a78bfa"/>
  <rect x="436" y="56" width="44" height="24" fill="#c4b5fd"/>
  <ellipse cx="458" cy="56" rx="22" ry="7" fill="#a78bfa"/>
  <text x="390" y="92" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#6d28d9">Primary</text>
  <text x="458" y="92" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#6d28d9">Secondary</text>

  <!-- Arrows: mongos <-> Shard 1 -->
  <line x1="185" y1="158" x2="140" y2="222" stroke="#64748b" stroke-width="1.8" marker-end="url(#ta)"/>
  <line x1="148" y1="226" x2="196" y2="164" stroke="#64748b" stroke-width="1.8" marker-end="url(#ta)"/>

  <!-- Arrows: mongos <-> Shard 2 -->
  <line x1="248" y1="158" x2="378" y2="222" stroke="#64748b" stroke-width="1.8" marker-end="url(#ta)"/>
  <line x1="376" y1="230" x2="248" y2="166" stroke="#64748b" stroke-width="1.8" marker-end="url(#ta)"/>

  <!-- Shard 1 box -->
  <rect x="20" y="228" width="220" height="82" rx="6" fill="#fff7ed" stroke="#f97316" stroke-width="2"/>
  <text x="130" y="249" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="700" fill="#9a3412">Shard 1</text>
  <ellipse cx="72" cy="282" rx="22" ry="7" fill="#fb923c"/>
  <rect x="50" y="264" width="44" height="24" fill="#fed7aa"/>
  <ellipse cx="72" cy="264" rx="22" ry="7" fill="#fb923c"/>
  <ellipse cx="148" cy="282" rx="22" ry="7" fill="#94a3b8"/>
  <rect x="126" y="264" width="44" height="24" fill="#e2e8f0"/>
  <ellipse cx="148" cy="264" rx="22" ry="7" fill="#94a3b8"/>
  <text x="72" y="302" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#7c2d12">Primary</text>
  <text x="148" y="302" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#475569">Secondary</text>

  <!-- Shard 2 box -->
  <rect x="318" y="228" width="220" height="82" rx="6" fill="#fefce8" stroke="#ca8a04" stroke-width="2"/>
  <text x="428" y="249" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="700" fill="#78350f">Shard 2</text>
  <ellipse cx="370" cy="282" rx="22" ry="7" fill="#fbbf24"/>
  <rect x="348" y="264" width="44" height="24" fill="#fef3c7"/>
  <ellipse cx="370" cy="264" rx="22" ry="7" fill="#fbbf24"/>
  <ellipse cx="446" cy="282" rx="22" ry="7" fill="#94a3b8"/>
  <rect x="424" y="264" width="44" height="24" fill="#e2e8f0"/>
  <ellipse cx="446" cy="264" rx="22" ry="7" fill="#94a3b8"/>
  <text x="370" y="302" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#78350f">Primary</text>
  <text x="446" y="302" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#475569">Secondary</text>
</svg>
