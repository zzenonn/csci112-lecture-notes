<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 220" width="480" height="220">
  <defs>
    <marker id="arrd" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L0,8 L8,4 z" fill="#94a3b8"/>
    </marker>
    <marker id="arrb" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L0,8 L8,4 z" fill="#3b82f6"/>
    </marker>
    <marker id="arrr" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L0,8 L8,4 z" fill="#f97316"/>
    </marker>
    <marker id="arrp" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L0,8 L8,4 z" fill="#a78bfa"/>
    </marker>
  </defs>

  <!-- Document boxes -->
  <rect x="30" y="10" width="82" height="30" rx="3" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="71" y="30" text-anchor="middle" font-family="monospace" font-size="12" fill="#334155">{ X : 25 }</text>

  <rect x="198" y="10" width="82" height="30" rx="3" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="239" y="30" text-anchor="middle" font-family="monospace" font-size="12" fill="#334155">{ X : 26 }</text>

  <rect x="367" y="10" width="82" height="30" rx="3" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="408" y="30" text-anchor="middle" font-family="monospace" font-size="12" fill="#334155">{ X : 27 }</text>

  <!-- Arrows down to hash function box -->
  <line x1="71" y1="40" x2="200" y2="84" stroke="#3b82f6" stroke-width="1.8" marker-end="url(#arrb)"/>
  <line x1="239" y1="40" x2="239" y2="84" stroke="#f97316" stroke-width="1.8" marker-end="url(#arrr)"/>
  <line x1="408" y1="40" x2="282" y2="84" stroke="#a78bfa" stroke-width="1.8" marker-end="url(#arrp)"/>

  <!-- HashFunction box -->
  <rect x="150" y="84" width="182" height="36" rx="5" fill="#f97316" stroke="#ea580c" stroke-width="1.5"/>
  <text x="241" y="107" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="700" fill="white">HashFunction</text>

  <!-- Arrows down to chunks -->
  <line x1="185" y1="120" x2="100" y2="158" stroke="#3b82f6" stroke-width="1.8" marker-end="url(#arrb)"/>
  <line x1="241" y1="120" x2="241" y2="158" stroke="#f97316" stroke-width="1.8" marker-end="url(#arrr)"/>
  <line x1="300" y1="120" x2="380" y2="158" stroke="#a78bfa" stroke-width="1.8" marker-end="url(#arrp)"/>

  <!-- Chunk A -->
  <rect x="10" y="158" width="170" height="48" rx="24" fill="#4ade80" stroke="#16a34a" stroke-width="1.5"/>
  <text x="95" y="178" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#14532d">Chunk A</text>
  <text x="95" y="196" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="600" fill="#14532d">minKey ≤ X &lt; 10</text>

  <!-- Chunk B -->
  <rect x="155" y="158" width="170" height="48" rx="24" fill="#4ade80" stroke="#16a34a" stroke-width="1.5"/>
  <text x="240" y="178" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#14532d">Chunk B</text>
  <text x="240" y="196" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="600" fill="#14532d">10 ≤ X &lt; 20</text>

  <!-- Chunk C -->
  <rect x="300" y="158" width="170" height="48" rx="24" fill="#4ade80" stroke="#16a34a" stroke-width="1.5"/>
  <text x="385" y="178" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#14532d">Chunk C</text>
  <text x="385" y="196" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="600" fill="#14532d">20 ≤ X &lt; maxKey</text>
</svg>
